<div class="px-md-4 py-5 text-center align-content-center bg-gradient-section h-90" [ngStyle]="{'filter': 'blur(' + blurValue + 'px)', 'opacity': opacityValue }"> 
    <div class="container">
        <div class="tagline border-0" i18n="@@heroHighlight">
            Disponível para Projetos Freelance & Consultoria
        </div>
        <h2 class="display-4 fw-bold text-light mb-4 primary-font" i18n="@@heroTitle">
            Desenvolvedor Fullstack <span class="text-primary-purple">.NET</span>
        </h2>
        <div class="mx-auto">
            <p class="text-gray mb-4 fs-4 mb-4" i18n="@@heroSubtitle">
                Especialista em construir sistemas web robustos e experiências interativas.
            </p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center"> 
                <a href="#projects" class="btn btn-primary-purple btn-lg" i18n="@@btnSeeProjects">
                    Ver Projetos
                </a>
            </div>
        </div>
    </div>
</div>
